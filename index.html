<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProBeauty-Website for the ladies</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",

        theme: {
          extend: {
            colors: {
              primary: "#619110",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav
      class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700"
    >
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="font-bold text-xl text-pink-600 dark:text-pink-400">
          ProBeauty
        </div>

        <!-- Desktop Links -->
        <div class="hidden md:flex items-center gap-8">
          <a
            href="#"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            Features
          </a>
          <a
            href="#"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            Pricing
          </a>
          <a
            href="#"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            About
          </a>
        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-4">
          <!-- Dark Mode -->
          <button
            onclick="toggleDark()"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            🌙
          </button>

          <!-- CTA Button -->
          <a
            href="#"
            class="hidden md:inline-block bg-pink-600 text-white px-5 py-2 rounded-full hover:bg-pink-700 transition"
          >
            Get Started
          </a>

          <!-- Hamburger -->
          <button class="md:hidden text-gray-700 dark:text-gray-300 text-2xl">
            ☰
          </button>
        </div>
      </div>
    </nav>

    <!-- HERO -->
     
  </body>
</html>

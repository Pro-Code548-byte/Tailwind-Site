<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProBeauty-Website for the ladies</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@200..800&family=Oswald:wght@200..700&display=swap"
      rel="stylesheet"
    />
    <script>
      tailwind.config = {
        darkMode: "class",

        theme: {
          extend: {
            colors: {
              primary: "#619110",
            },
          },
        },
      };
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <!-- NAVBAR -->
    <nav
      class="sticky top-0 z-50 bg-white dark:bg-gray-900 border-b border-gray-200 dark:border-gray-700"
    >
      <div
        class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <!-- Logo -->
        <div class="font-bold text-xl text-pink-600 dark:text-pink-400">
          ProBeauty
        </div>

        <!-- Desktop Links -->
        <div class="hidden md:flex items-center gap-8">
          <a
            href="#"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            Features
          </a>
          <a
            href="#"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            Pricing
          </a>
          <a
            href="#"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            About
          </a>
        </div>

        <!-- Right Side -->
        <div class="flex items-center gap-4">
          <!-- Dark Mode -->
          <button
            onclick="toggleDark()"
            class="text-gray-600 dark:text-gray-300 hover:text-pink-600 dark:hover:text-pink-400 transition"
          >
            🌙
          </button>

          <!-- CTA Button -->
          <a
            href="#"
            class="hidden md:inline-block bg-pink-600 text-white px-5 py-2 rounded-full hover:bg-pink-700 transition"
          >
            Get Started
          </a>

          <!-- Hamburger -->
          <button class="md:hidden text-gray-700 dark:text-gray-300 text-2xl">
            ☰
          </button>
        </div>
      </div>
    </nav>

    <!-- HERO -->
    <section class="py-20 md:py-32 px-6 text-center bg-white dark:bg-gray-900">
      <!-- Optional Badge -->
      <div
        class="inline-block mb-6 bg-pink-100 text-pink-700 rounded-full px-4 py-2 text-xs font-semibold"
      >
        ✨ Beauty Redefined
      </div>

      <!-- Headline -->
      <h1
        class="text-5xl md:text-6xl lg:text-7xl font-black leading-tight text-gray-900 dark:text-white"
      >
        Glow with Confidence
        <span class="text-pink-600 dark:text-pink-400"> with ProBeauty</span>
      </h1>

      <!-- Subheadline -->
      <p
        class="mt-6 text-lg md:text-xl text-gray-500 dark:text-gray-400 max-w-2xl mx-auto"
      >
        Discover premium skincare products designed to enhance your natural
        beauty and bring out your radiant glow.
      </p>

      <!-- Buttons -->
      <div
        class="mt-10 flex flex-col sm:flex-row items-center justify-center gap-4"
      >
        <!-- Primary Button -->
        <a
          href="#"
          class="bg-pink-600 text-white px-8 py-3 rounded-full hover:bg-pink-700 transition font-semibold"
        >
          Shop Now
        </a>

        <!-- Secondary Button -->
        <a
          href="#"
          class="border border-pink-600 text-pink-600 dark:text-pink-400 dark:border-pink-400 px-8 py-3 rounded-full hover:bg-pink-50 dark:hover:bg-gray-800 transition font-semibold"
        >
          Learn More
        </a>
      </div>
    </section>
  </body>
</html>
